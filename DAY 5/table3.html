 <!DOCTYPE html>
<html>
<head>
    <title>Rowspan Table</title>

    <style>
        body{
            background-color: #0b1020;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial, sans-serif;
        }

        table{
            border-collapse: collapse;
            width: 500px;
            background-color: #111827;
        }

        th, td{
            border: 4px solid white;
            padding: 20px;
            text-align: center;
        }

        th{
            color: orange;
            font-size: 30px;
        }

        td{
            color: #d9ff66;
            font-size: 28px;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <table>

        <tr>
            <th>Name</th>
            <th>Companies</th>
        </tr>

        <tr>
            <td rowspan="3">James</td>
            <td>Sun Microsystems</td>
        </tr>

        <tr>
            <td>Oracle</td>
        </tr>

        <tr>
            <td>Liquid Robotics</td>
        </tr>

        <tr>
            <td rowspan="3">Guido</td>
            <td>Google</td>
        </tr>

        <tr>
            <td>Dropbox</td>
        </tr>

        <tr>
            <td>Microsoft</td>
        </tr>

    </table>

</body>
</html>
